; PlatformIO project configuration for Spot-Welder-Pro
; -----------------------------------------------------------------------------------------
; Source files (.ino + .h) live in the project root for Arduino IDE compatibility.
; PlatformIO is configured to use the project root as its src_dir.

[platformio]
default_envs = nano_atmega328
src_dir = .

[common]
build_flags =
  -Wall -Wextra -Wno-unused-parameter
  -D__AVR_ATmega328P__
lib_deps =
  adafruit/Adafruit SSD1306 @ ^2.5.0
  robtillaart/INA226 @ ^0.5.0

[env:nano_atmega328]
platform          = atmelavr
board             = nanoatmega328new
framework         = arduino
monitor_speed     = 115200
build_flags       = ${common.build_flags} -D_DEVELOPMENT_ -D_LANG_EN_
lib_deps          = ${common.lib_deps}
build_src_filter  = +<*> -<.git> -<syntax-check> -<.github> -<download> -<*.md> -<LICENSE> -<platformio.ini> -<library.properties> -<.clang-format> -<.gitignore>

[env:production]
platform          = atmelavr
board             = nanoatmega328new
framework         = arduino
monitor_speed     = 115200
build_flags       = ${common.build_flags} -D_LANG_EN_
lib_deps          = ${common.lib_deps}
build_src_filter  = +<*> -<.git> -<syntax-check> -<.github> -<download> -<*.md> -<LICENSE> -<platformio.ini> -<library.properties> -<.clang-format> -<.gitignore>

[env:testing]
platform          = atmelavr
board             = nanoatmega328new
framework         = arduino
monitor_speed     = 115200
build_flags       = ${common.build_flags} -D_DEVELOPMENT_ -D_LANG_EN_ -D_TESTING_
lib_deps          = ${common.lib_deps}
build_src_filter  = +<*> -<.git> -<syntax-check> -<.github> -<download> -<*.md> -<LICENSE> -<platformio.ini> -<library.properties> -<.clang-format> -<.gitignore>
