; PlatformIO project configuration for Spot-Welder-Pro
; -----------------------------------------------------------------------------------------
; This file lets you build and flash the firmware with PlatformIO instead of the Arduino
; IDE — useful for CI, headless development, and editors like VS Code.
;
; Quick start:
;   pip install platformio
;   pio run                # build
;   pio run -t upload      # build + flash (requires the board on a USB port)
;   pio device monitor     # serial monitor (115200 baud)
;
; Build flags:
;   Default: _DEVELOPMENT_ on, _LANG_EN_ on.
;   Override with: pio run -e production   (no Serial debug, smaller image)
;                   pio run -e testing     (low-battery alarm bypassed)

[platformio]
default_envs = nano_atmega328

; Common settings shared by every environment
[common]
build_flags =
  -Wall -Wextra -Wno-unused-parameter
  -D__AVR_ATmega328P__
lib_deps =
  adafruit/Adafruit SSD1306@^2.5.0
  robtillaart/INA226@^0.5.0

; --- Default environment: matches the Arduino IDE build ---
[env:nano_atmega328]
platform          = atmelavr
board             = nanoatmega328new
framework         = arduino
monitor_speed     = 115200
build_flags       =
  ${common.build_flags}
  -D_DEVELOPMENT_
  -D_LANG_EN_
lib_deps          = ${common.lib_deps}

; --- Production environment: no Serial debug → smaller image, faster boot ---
[env:production]
platform          = atmelavr
board             = nanoatmega328new
framework         = arduino
monitor_speed     = 115200
build_flags       =
  ${common.build_flags}
  -D_LANG_EN_
lib_deps          = ${common.lib_deps}

; --- Testing environment: low-battery alarm bypassed for bench testing ---
[env:testing]
platform          = atmelavr
board             = nanoatmega328new
framework         = arduino
monitor_speed     = 115200
build_flags       =
  ${common.build_flags}
  -D_DEVELOPMENT_
  -D_LANG_EN_
  -D_TESTING_
lib_deps          = ${common.lib_deps}
