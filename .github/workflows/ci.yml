# Continuous Integration — verify every push and PR compiles cleanly.
# -----------------------------------------------------------------------------------------
# Three job families:
#   1. Build matrix  — PlatformIO builds the firmware for 3 environments
#   2. Syntax check  — g++ with Arduino stubs (catches type errors without avr-gcc)
#   3. Lint          — clang-format style enforcement
#
# The syntax-check stubs are committed under syntax-check/ (not gitignored) so the
# job just compiles them directly without any inline heredoc generation.

name: CI

on:
  push:
    branches: [main, refactor/professional-cleanup]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build (${{ matrix.env }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env: [nano_atmega328, production, testing]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Build firmware
        run: pio run -e ${{ matrix.env }}

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.env }}
          path: |
            .pio/build/${{ matrix.env }}/firmware.hex
            .pio/build/${{ matrix.env }}/firmware.elf
          if-no-files-found: warn

  syntax-check:
    name: Syntax check (g++ with stubs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install g++
        run: sudo apt-get update && sudo apt-get install -y g++
      - name: Compile-test with Arduino stubs
        run: |
          g++ -std=c++14 -fsyntax-only -Wall -Wextra \
              -Isyntax-check -Isyntax-check/arduino \
              syntax-check/check.cpp

  lint:
    name: Code style check (clang-format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format
      - name: Verify formatting
        run: |
          set -e
          FILES=$(find . -maxdepth 1 \( -name '*.ino' -o -name '*.h' \))
          for f in $FILES; do
            if ! clang-format --dry-run --Werror "$f" > /dev/null 2>&1; then
              echo "::error file=$f::Code style violations in $f"
              clang-format "$f" | diff -u "$f" - || true
              exit 1
            fi
          done
